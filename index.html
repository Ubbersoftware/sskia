  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; background: #0A0F16; font-family: "Inter", sans-serif; -webkit-font-smoothing: antialiased; }

    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes scanPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    .screen-transition { animation: slideIn 0.35s ease-out; }
    /* Tweaks panel */
    .tweaks-panel {
      position: fixed; right: 20px; bottom: 20px; z-index: 1000;
      width: 280px; background: #0B1B2B; color: #F7F3EC;
      border: 1px solid rgba(201,165,92,0.35); border-radius: 14px;
      padding: 16px; font-family: "Inter", sans-serif;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .tweaks-title {
      font-family: "Cormorant Garamond", serif; font-size: 16px;
      letter-spacing: 1px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tweak-label { font-size: 9px; letter-spacing: 1.5px; color: #C9A55C; text-transform: uppercase; margin-bottom: 6px; }
    .tweak-row { margin-bottom: 14px; }
    .tweak-opts { display: flex; gap: 4px; flex-wrap: wrap; }
    .tweak-opt {
      flex: 1; min-width: 0; padding: 8px 6px; border-radius: 8px;
      background: rgba(255,255,255,0.05); color: #F7F3EC;
      border: 1px solid rgba(201,165,92,0.15); cursor: pointer;
      font-size: 11px; text-align: center;
    }
    .tweak-opt.active { background: rgba(201,165,92,0.15); border-color: #C9A55C; color: #E6C98A; }
  </style>
</head>

// ===== frames/ios-frame.jsx =====

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// Shared tiny icons (stroke-based, minimal)
const Icon = {

  chevronL: (c = '#6B7280', s = 14) => (

  ),
  clock: (c) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.4"/><path d="M12 7v5l3 2" stroke={c} strokeWidth="1.4" strokeLinecap="round"/></svg>
  ),
  video: (c) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="6.5" width="13" height="11" rx="2" stroke={c} strokeWidth="1.4"/><path d="M15.5 10.5l6-3v9l-6-3v-3z" stroke={c} strokeWidth="1.4" strokeLinejoin="round"/></svg>
  ),
  lounge: (c) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 14v5M20 14v5M4 14h16M4 14v-3a3 3 0 013-3h10a3 3 0 013 3v3M8 8V6a2 2 0 012-2h4a2 2 0 012 2v2" stroke={c} strokeWidth="1.4" strokeLinecap="round"/></svg>
  ),
  concierge: (c) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 19h14M6 19v-3a6 6 0 0112 0v3M12 7V4M10 4h4" stroke={c} strokeWidth="1.4" strokeLinecap="round"/></svg>

function Button({ children, variant='primary', onClick, full, size='md', style={}, disabled }) {
  const base = {
    fontFamily: TOKENS.sans,
    fontWeight: 500,
    borderRadius: 999,
    border: 'none',
    cursor: disabled ? 'not-allowed' : 'pointer',
    opacity: disabled ? 0.5 : 1,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap:8,
    letterSpacing: 0.2,
    transition: 'all 0.2s ease',
    width: full ? '100%' : undefined,
    fontSize: size==='sm' ? 13 : 14,
    padding: size==='sm' ? '8px 16px' : '14px 22px',
  };
  const variants = {
    primary: { background: TOKENS.navy, color: TOKENS.ivory },
    gold:    { background: TOKENS.gold, color: TOKENS.navy },
    outline: { background:'transparent', color: TOKENS.navy, boxShadow:`inset 0 0 0 1px ${TOKENS.navy}` },

    goldOutline: { background:'transparent', color: TOKENS.gold, boxShadow:`inset 0 0 0 1px ${TOKENS.gold}`},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base, ...variants[variant], ...style}}>{children}</button>;
}

  React.useEffect(() => {
    if (stage === 1) {
      const t = setTimeout(() => setStage(2), 1400);
      return () => clearTimeout(t);
    }
  }, [stage]);

  if (stage < 2) {
    return (
      <div style={{
        height:'100%', background: TOKENS.navyDeep, color: TOKENS.ivory,
        display:'flex', flexDirection:'column', padding:'80px 28px 40px',

        backgroundImage: `radial-gradient(ellipse at top, ${TOKENS.navySoft} 0%, ${TOKENS.navyDeep} 60%)`,
      }}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:40}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <SskiaMark size={22}/>
            <span style={{fontFamily:TOKENS.serif, fontSize:17, letterSpacing:1.5, color:TOKENS.ivory}}>SSKIA</span>
            <span style={{fontFamily:TOKENS.sans, fontSize:10, letterSpacing:2, color:TOKENS.gold}}>SMARTLOUNGE</span>
          </div>
        </div>

        <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center'}}>
          <div style={{
            width:200, height:200, borderRadius:18,
            background: TOKENS.ivory, padding:18, position:'relative',
            boxShadow:`0 0 60px rgba(201,165,92,0.25)`,
          }}>
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              {/* Stylized QR */}
              {[...Array(13)].map((_,r)=>[...Array(13)].map((_,c)=>{
                const v = ((r*c + r + c*3) % 5) > 2 || (r<3&&c<3) || (r<3&&c>9) || (r>9&&c<3);
                if (!v) return null;
                return <rect key={`${r}-${c}`} x={4+c*7} y={4+r*7} width="6" height="6" fill={TOKENS.navy}/>;
              }))}
              <rect x="4" y="4" width="20" height="20" fill="none" stroke={TOKENS.navy} strokeWidth="2"/>
              <rect x="10" y="10" width="8" height="8" fill={TOKENS.gold}/>

            {stage===1 && <div style={{
              position:'absolute', inset:18, border:`2px solid ${TOKENS.gold}`,
              animation:'scanPulse 1.4s ease-in-out infinite',

          <div style={{marginTop:14, fontSize:13, color:'rgba(247,243,236,0.65)', letterSpacing:0.3, lineHeight:1.6, maxWidth:280}}>
            {stage===0
              ? 'Scan the code at the SmartLounge entrance to unlock personalised concierge and banking services.'
              : 'Matching your itinerary and premier status…'}
          </div>
        </div>

        {stage===0 && (
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            <Button variant="gold" full onClick={()=>setStage(1)}>
              {Icon.qr(TOKENS.navy, 16)} Simulate QR scan

            <div style={{textAlign:'center', fontSize:11, color:'rgba(247,243,236,0.45)', letterSpacing:1.2, textTransform:'uppercase', marginTop:6}}>

          </div>
        )}
      </div>
    );

  return (
    <div style={{
      height:'100%', background: TOKENS.navyDeep, color: TOKENS.ivory,

      fontFamily: TOKENS.sans,
      backgroundImage: `radial-gradient(ellipse at top right, rgba(201,165,92,0.18) 0%, transparent 50%), radial-gradient(ellipse at bottom, ${TOKENS.navySoft} 0%, ${TOKENS.navyDeep} 60%)`,

      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28}}>

// RM Booking deep flow — specialization → RM list → RM detail → meeting type → date/time → confirm → live status
function RMBookingFlow({ persona, onBack, onHome, initialStep=0 }) {
  const [step, setStep] = React.useState(initialStep);
  const [spec, setSpec] = React.useState('esg');
  const [rm, setRm] = React.useState(null);
  const [meetingType, setMeetingType] = React.useState('lounge');
  const [date, setDate] = React.useState('18');
  const [time, setTime] = React.useState('15:20');
  const [purpose, setPurpose] = React.useState('ESG-linked financing discussion');

  const next = () => setStep(s => s+1);
  const prev = () => step===0 ? onBack() : setStep(s => s-1);

  return (
    <div style={{height:'100%', background:TOKENS.ivory, display:'flex', flexDirection:'column', fontFamily:TOKENS.sans}}>
      <RMHeader step={step} onBack={prev} onHome={onHome}/>
      <div style={{flex:1, overflow:'auto'}}>
        {step===0 && <Step0_Spec spec={spec} setSpec={setSpec} persona={persona} onNext={next}/>}
        {step===1 && <Step1_RMs spec={spec} onPick={(r)=>{setRm(r); next();}} />}
        {step===2 && rm && <Step2_RMDetail rm={rm} onNext={next}/>}
        {step===3 && <Step3_Type meetingType={meetingType} setMeetingType={setMeetingType} onNext={next}/>}
        {step===4 && <Step4_When date={date} setDate={setDate} time={time} setTime={setTime} purpose={purpose} setPurpose={setPurpose} onNext={next}/>}
        {step===5 && rm && <Step5_Confirm persona={persona} rm={rm} meetingType={meetingType} date={date} time={time} purpose={purpose} onConfirm={next}/>}
        {step===6 && rm && <Step6_LiveStatus rm={rm} meetingType={meetingType} time={time} onHome={onHome}/>}
      </div>
    </div>
  );
}

function RMHeader({ step, onBack, onHome }) {
  const total = 6;
  const steps = ['Focus', 'Specialist', 'Profile', 'Format', 'When', 'Confirm', 'Booked'];
  return (
    <div style={{
      background: TOKENS.navyDeep, color: TOKENS.ivory, padding:'56px 18px 14px',
    }}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
        <button onClick={onBack} style={{background:'none', border:'none', color:TOKENS.ivory, display:'flex', alignItems:'center', gap:6, cursor:'pointer', padding:'4px 8px', marginLeft:-8, fontFamily:TOKENS.sans, fontSize:13}}>
          {Icon.chevronL(TOKENS.ivory, 16)} Back
        </button>
        <div style={{fontFamily:TOKENS.serif, fontSize:14, letterSpacing:1.5}}>
          RM Booking
        </div>
        <button onClick={onHome} style={{background:'none', border:'none', color:'rgba(247,243,236,0.5)', cursor:'pointer', fontSize:11, letterSpacing:1.2, textTransform:'uppercase', fontFamily:TOKENS.sans}}>
          Close
        </button>

      <div style={{display:'flex', gap:4, marginTop:4}}>
        {[...Array(total)].map((_,i) => (
          <div key={i} style={{
            flex:1, height:2, borderRadius:2,
            background: i <= step ? TOKENS.gold : 'rgba(247,243,236,0.15)',
            transition:'background 0.3s',
          }}/>
        ))}
      </div>
      <div style={{marginTop:8, fontSize:10, letterSpacing:2, color:TOKENS.gold, textTransform:'uppercase'}}>

    </div>
  );

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "persona": "investor",
      "startScreen": "arrival",
      "background": "lounge"
    }/*EDITMODE-END*/;

    // Load persisted screen if available
    const persisted = (() => {
      try { return JSON.parse(localStorage.getItem('sskia_screen') || 'null'); } catch { return null; }
    })();

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [screen, setScreen] = React.useState(persisted?.screen || TWEAK_DEFAULTS.startScreen);
      const [rmStep, setRmStep] = React.useState(persisted?.rmStep || 0);
      const [showTweaks, setShowTweaks] = React.useState(false);

      const persona = PERSONAS[tweaks.persona];

      React.useEffect(() => {
        localStorage.setItem('sskia_screen', JSON.stringify({ screen, rmStep }));
      }, [screen, rmStep]);

      // Edit mode protocol
      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
          if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const setTweak = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      };

      const goHome = () => setScreen('home');

      let content;
      const k = screen;
      if (k === 'arrival') content = <ArrivalScreen persona={persona} onContinue={goHome}/>;
      else if (k === 'home') content = <HomeScreen persona={persona} onNav={(target) => {
        if (target === 'rm') { setRmStep(0); setScreen('rm'); }
        else setScreen(target);
      }}/>;
      else if (k === 'rm') content = <RMBookingFlow persona={persona} initialStep={rmStep} onBack={goHome} onHome={goHome}/>;
      else if (k === 'lounge') content = <LoungeScreen onBack={goHome}/>;
      else if (k === 'concierge') content = <ConciergeScreen onBack={goHome}/>;
      else if (k === 'insights') content = <InsightsScreen onBack={goHome}/>;
      else if (k === 'account') content = <AccountScreen onBack={goHome}/>;
      else if (k === 'bookings') content = <BookingsScreen onBack={goHome} onOpenLive={()=>{ setRmStep(6); setScreen('rm'); }}/>;

      // Background scenery (airport feel)
      const bgStyles = {
        lounge: {
          backgroundImage: `
            radial-gradient(ellipse at 20% 30%, rgba(201,165,92,0.06) 0%, transparent 40%),
            radial-gradient(ellipse at 80% 70%, rgba(201,165,92,0.04) 0%, transparent 40%),
            linear-gradient(180deg, #0A0F16 0%, #0B1B2B 50%, #071320 100%)
          `,
        },
        neutral: { background: '#111' },
        parchment: { background: '#1A1510' },
      };

      return (
        <div style={{
          minHeight:'100vh', width:'100%', background:'#000',
          display:'flex', flexDirection:'column',
        }}>
          <div key={screen} className="screen-transition" style={{flex:1, minHeight:'100vh', background:'#0A0F16'}}>
            {content}
          </div>

          {showTweaks && (
            <div className="tweaks-panel">
              <div className="tweaks-title">
                <span>Tweaks</span>
                <button onClick={()=>setShowTweaks(false)} style={{background:'none', border:'none', color:'rgba(247,243,236,0.5)', cursor:'pointer', fontSize:14}}>×</button>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Start screen</div>
                <div className="tweak-opts">
                  {[['arrival','Arrival'],['home','Home'],['rm','RM Flow'],['bookings','Bookings']].map(([v,l]) => (
                    <button key={v} className={'tweak-opt' + (screen===v ? ' active':'')} onClick={()=>{setScreen(v); if(v==='rm') setRmStep(0);}}>{l}</button>
                  ))}
                </div>
              </div>

              {screen==='rm' && (
                <div className="tweak-row">
                  <div className="tweak-label">RM Booking step</div>
                  <div className="tweak-opts">
                    {['Focus','RMs','Profile','Format','When','Confirm','Live'].map((l,i)=>(
                      <button key={i} className={'tweak-opt' + (rmStep===i?' active':'')} onClick={()=>setRmStep(i)} style={{flex:'0 0 calc(25% - 3px)', fontSize:10, padding:'6px 2px'}}>{l}</button>
                    ))}
                  </div>
                </div>
              )}

              <div className="tweak-row">
                <div className="tweak-label">Persona</div>
                <div className="tweak-opts">
                  {[['investor','HNW Investor'],['corporate','Corporate']].map(([v,l]) => (
                    <button key={v} className={'tweak-opt' + (tweaks.persona===v?' active':'')} onClick={()=>setTweak('persona', v)}>{l}</button>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Ambient backdrop</div>
                <div className="tweak-opts">
                  {[['lounge','Lounge'],['neutral','Neutral'],['parchment','Warm']].map(([v,l]) => (
                    <button key={v} className={'tweak-opt' + (tweaks.background===v?' active':'')} onClick={()=>setTweak('background', v)}>{l}</button>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Other screens</div>
                <div className="tweak-opts">
                  {[['lounge','Lounge'],['concierge','Concierge'],['insights','Insights'],['account','Account']].map(([v,l]) => (
                    <button key={v} className={'tweak-opt' + (screen===v?' active':'')} onClick={()=>setScreen(v)} style={{flex:'0 0 calc(50% - 2px)'}}>{l}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
